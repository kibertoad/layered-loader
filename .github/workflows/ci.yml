---
name: ci

on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      matrix:
        node-version: [22.x, 24.x, 26.x]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          always-auth: false
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start Docker
        run: pnpm run docker:start

      - name: Build
        run: pnpm -r --include-workspace-root run build

      - name: Run Tests
        run: pnpm run test:coverage

      - name: Run @layered-loader/sqs Tests
        run: pnpm --filter @layered-loader/sqs test

      - name: Stop Docker
        run: pnpm run docker:stop

      - name: Run Linting
        run: pnpm -r --include-workspace-root run lint

  automerge:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: fastify/github-action-merge-dependabot@d1b52cc4c7e618b19de8a43c7138213b277e820c # v3.14.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
